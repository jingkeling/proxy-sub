services:
  app:
    # 强制指定容器名，方便 NPM 引用和日志查看
    # 使用变量以支持多项目复用 (在 CI/CD 中注入)
    container_name: ${CONTAINER_NAME}
    # 使用 GitHub Container Registry 上的私有镜像
    # 格式：ghcr.io/用户名/仓库名:标签
    image: ${FULL_IMAGE_NAME}
    restart: always
    networks:
      - global_proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.proxy-sub.rule=Host(`proxy-sub.yesxno.com`)
      - traefik.http.routers.proxy-sub.entrypoints=websecure
      - traefik.http.routers.proxy-sub.tls=true
      - traefik.http.services.proxy-sub.loadbalancer.server.port=3000


networks:
  global_proxy:
    external: true # 告诉 Docker 使用你手动创建的那个“全局网关”网络
